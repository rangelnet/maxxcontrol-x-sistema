services:
  - type: web
    name: maxxcontrol-x-sistema
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: maxxcontrol-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: USE_SQLITE
        value: "false"

databases:
  - name: maxxcontrol-db
    plan: free
