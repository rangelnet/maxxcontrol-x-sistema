services:
  - type: web
    name: maxxcontrol-x-sistema
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - fromGroup: maxxcontrol-secrets
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: USE_SQLITE
        value: "false"
    routes:
      - type: rewrite
        source: /api/*
        destination: /api/*
      - type: rewrite
        source: /banners/*
        destination: /banners/*
      - type: rewrite
        source: /media/*
        destination: /media/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: maxxcontrol-db
    plan: free
