name: Deploy Staging - Aplicar Migrações Supabase

on:
  push:
    branches:
      - develop
    paths:
      - 'database/migrations/**'

jobs:
  deploy-migrations-staging:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Aplicar migrações no Supabase (Staging)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN_STAGING }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_STAGING }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID_STAGING }}
        run: |
          echo "Conectando ao Supabase (Staging)..."
          supabase link --project-ref $SUPABASE_PROJECT_ID
          
          echo "Aplicando migrações..."
          for file in database/migrations/*.sql; do
            if [ -f "$file" ]; then
              echo "Executando migração: $file"
              supabase db execute --file "$file" --db-url "postgresql://postgres:${SUPABASE_DB_PASSWORD}@db.${SUPABASE_PROJECT_ID}.supabase.co:5432/postgres"
            fi
          done
          
          echo "Migrações aplicadas com sucesso no staging!"

      - name: Notificar sucesso
        if: success()
        run: |
          echo "✅ Migrações aplicadas com sucesso no ambiente de staging!"
          echo "Projeto: ${{ secrets.SUPABASE_PROJECT_ID_STAGING }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

      - name: Notificar falha
        if: failure()
        run: |
          echo "❌ Erro ao aplicar migrações no ambiente de staging!"
          echo "Verifique os logs acima para mais detalhes."
          exit 1
